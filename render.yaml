services:
  - type: web
    runtime: static
    name: nexus-website
    buildCommand: cd src/nexus-website && npm install && npx vite build
    staticPublishPath: src/nexus-website/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_NEXUS_CORE_URL
        value: "https://nexus-core-361y.onrender.com"

  - type: web
    name: nexus-core
    runtime: docker
    dockerfilePath: src/nexus-core/Dockerfile
    dockerContext: src/nexus-core
    plan: free
    healthCheckPath: /health
    envVars:
      - key: TRANSPORT
        value: sse
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: RELAYER_PRIVATE_KEY
        sync: false
      - key: ESCROW_CONTRACT
        sync: false
      - key: RPC_URL
        sync: false
      - key: PORTAL_TOKEN
        sync: false
      - key: BASE_URL
        value: "https://nexus-core-361y.onrender.com"

  - type: web
    name: nexus-hotel-agent
    runtime: docker
    dockerfilePath: src/hotel-agent/Dockerfile
    dockerContext: src/hotel-agent
    plan: free
    envVars:
      - key: TRANSPORT
        value: http
      - key: PORTAL_PORT
        value: "10000"
      - key: PORTAL_HOST
        value: "0.0.0.0"
      - key: DATABASE_URL
        sync: false
      - key: AMADEUS_API_KEY
        sync: false
      - key: AMADEUS_API_SECRET
        sync: false
      - key: MERCHANT_SIGNER_PRIVATE_KEY
        sync: false
      - key: MERCHANT_PAYMENT_ADDRESS
        value: "0xB030C3a17DD68C17c0EE8F1001326e0C029f0ADd"
      - key: MERCHANT_DID
        value: "did:nexus:20250407:demo_hotel"
      - key: NEXUS_CORE_URL
        value: "https://nexus-core-361y.onrender.com"

  - type: web
    name: nexus-flight-agent
    runtime: docker
    dockerfilePath: src/flight-agent/Dockerfile
    dockerContext: src/flight-agent
    plan: free
    envVars:
      - key: TRANSPORT
        value: http
      - key: PORTAL_PORT
        value: "10000"
      - key: PORTAL_HOST
        value: "0.0.0.0"
      - key: DATABASE_URL
        sync: false
      - key: DUFFEL_API_TOKEN
        sync: false
      - key: MERCHANT_SIGNER_PRIVATE_KEY
        sync: false
      - key: MERCHANT_PAYMENT_ADDRESS
        value: "0xA1c249A993f31e6c27bC8886caCEc3f9f3b7a9D1"
      - key: MERCHANT_DID
        value: "did:nexus:20250407:demo_flight"
      - key: NEXUS_CORE_URL
        value: "https://nexus-core-361y.onrender.com"

  - type: web
    name: nexus-telegram-bot
    runtime: docker
    dockerfilePath: src/telegram-bot/Dockerfile
    dockerContext: src/telegram-bot
    plan: free
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: NEXUS_CORE_URL
        value: "https://nexus-core-361y.onrender.com"
      - key: PORT
        value: "10000"
      - key: BASE_URL
        sync: false
