databases:
  - name: xagentpay-db
    region: singapore
    plan: free
    databaseName: xagentpay
    user: xagentpay

services:
  - type: web
    runtime: static
    name: xagent-website
    buildCommand: cd src/xagent-website && npm install && npx vite build
    staticPublishPath: src/xagent-website/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_XAGENT_CORE_URL
        sync: false

  - type: web
    name: xagent-core
    region: singapore
    runtime: docker
    dockerfilePath: src/xagent-core/Dockerfile
    dockerContext: src/xagent-core
    plan: free
    healthCheckPath: /health
    envVars:
      - key: TRANSPORT
        value: http
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: xagentpay-db
          property: connectionString
      - key: RELAYER_PRIVATE_KEY
        sync: false
      - key: ESCROW_CONTRACT
        value: "0x959028964e8a4e52d6AC716E621B68b3fa579A25"
      - key: RPC_URL
        value: "https://rpc.xlayer.tech"
      - key: CHAIN_ID
        value: "196"
      - key: CHAIN_NAME
        value: "XLayer Mainnet"
      - key: USDC_ADDRESS
        value: "0x74b7F16337b8972027F6196A17a631aC6dE26d22"
      - key: PORTAL_TOKEN
        sync: false
      - key: BASE_URL
        sync: false
      - key: TELEGRAM_NOTIFY_URL
        value: "https://xagent-telegram-bot-8fzu.onrender.com/api/payment-notify"

  - type: web
    name: xagent-hotel-agent
    region: singapore
    runtime: docker
    dockerfilePath: src/hotel-agent/Dockerfile
    dockerContext: src/hotel-agent
    plan: free
    healthCheckPath: /health
    envVars:
      - key: TRANSPORT
        value: http
      - key: PORTAL_PORT
        value: "10000"
      - key: PORTAL_HOST
        value: "0.0.0.0"
      - key: DATABASE_URL
        fromDatabase:
          name: xagentpay-db
          property: connectionString
      - key: AMADEUS_API_KEY
        sync: false
      - key: AMADEUS_API_SECRET
        sync: false
      - key: MERCHANT_SIGNER_PRIVATE_KEY
        sync: false
      - key: MERCHANT_PAYMENT_ADDRESS
        value: "0xB030C3a17DD68C17c0EE8F1001326e0C029f0ADd"
      - key: MERCHANT_DID
        value: "did:xagent:196:demo_hotel"
      - key: XAGENT_CORE_URL
        value: "https://api.xagenpay.com"
      - key: XAGENT_WEBHOOK_SECRET
        value: "REDACTED_WEBHOOK_SECRET"
      - key: PORTAL_BASE_URL
        value: "https://xagent-hotel-agent-d2lj.onrender.com"

  - type: web
    name: xagent-flight-agent
    region: singapore
    runtime: docker
    dockerfilePath: src/flight-agent/Dockerfile
    dockerContext: src/flight-agent
    plan: free
    healthCheckPath: /health
    envVars:
      - key: TRANSPORT
        value: http
      - key: PORTAL_PORT
        value: "10000"
      - key: PORTAL_HOST
        value: "0.0.0.0"
      - key: DATABASE_URL
        fromDatabase:
          name: xagentpay-db
          property: connectionString
      - key: DUFFEL_API_TOKEN
        sync: false
      - key: MERCHANT_SIGNER_PRIVATE_KEY
        sync: false
      - key: MERCHANT_PAYMENT_ADDRESS
        value: "0xA1c249A993f31e6c27bC8886caCEc3f9f3b7a9D1"
      - key: MERCHANT_DID
        value: "did:xagent:196:demo_flight"
      - key: XAGENT_CORE_URL
        value: "https://api.xagenpay.com"
      - key: XAGENT_WEBHOOK_SECRET
        value: "REDACTED_WEBHOOK_SECRET"
      - key: PORTAL_BASE_URL
        value: "https://xagent-flight-agent-3xb1.onrender.com"

  - type: web
    name: xagent-telegram-bot
    region: singapore
    runtime: docker
    dockerfilePath: src/telegram-bot/Dockerfile
    dockerContext: src/telegram-bot
    plan: free
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: XAGENT_CORE_URL
        value: "https://api.xagenpay.com"
      - key: PORT
        value: "10000"
      - key: BASE_URL
        sync: false

  - type: web
    name: telegram-order-panel
    region: singapore
    runtime: node
    rootDir: src/telegram-order-panel
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TG_BOT_TOKEN
        sync: false
      - key: FLIGHT_API
        value: "https://xagent-flight-agent-3xb1.onrender.com/api/v1/call-tool"
      - key: HOTEL_API
        value: "https://xagent-hotel-agent-d2lj.onrender.com/api/v1/call-tool"
