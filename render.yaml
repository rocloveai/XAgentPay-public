services:
  - type: web
    name: nexus-core
    runtime: docker
    dockerfilePath: src/nexus-core/Dockerfile
    dockerContext: src/nexus-core
    plan: free
    envVars:
      - key: TRANSPORT
        value: sse
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: RELAYER_PRIVATE_KEY
        sync: false
      - key: ESCROW_CONTRACT
        sync: false
      - key: RPC_URL
        sync: false
      - key: PORTAL_TOKEN
        sync: false

  - type: web
    name: nexus-hotel-agent
    runtime: docker
    dockerfilePath: src/hotel-agent/Dockerfile
    dockerContext: src/hotel-agent
    plan: free
    envVars:
      - key: TRANSPORT
        value: http
      - key: PORTAL_PORT
        value: "10000"
      - key: PORTAL_HOST
        value: "0.0.0.0"
      - key: DATABASE_URL
        sync: false
      - key: AMADEUS_API_KEY
        sync: false
      - key: AMADEUS_API_SECRET
        sync: false
      - key: MERCHANT_SIGNER_PRIVATE_KEY
        sync: false
      - key: MERCHANT_PAYMENT_ADDRESS
        value: "0xB030C3a17DD68C17c0EE8F1001326e0C029f0ADd"
      - key: MERCHANT_DID
        value: "did:nexus:20250407:demo_hotel"

  - type: web
    name: nexus-flight-agent
    runtime: docker
    dockerfilePath: src/flight-agent/Dockerfile
    dockerContext: src/flight-agent
    plan: free
    envVars:
      - key: TRANSPORT
        value: http
      - key: PORTAL_PORT
        value: "10000"
      - key: PORTAL_HOST
        value: "0.0.0.0"
      - key: DATABASE_URL
        sync: false
      - key: DUFFEL_API_TOKEN
        sync: false
      - key: MERCHANT_SIGNER_PRIVATE_KEY
        sync: false
      - key: MERCHANT_PAYMENT_ADDRESS
        value: "0xA1c249A993f31e6c27bC8886caCEc3f9f3b7a9D1"
      - key: MERCHANT_DID
        value: "did:nexus:20250407:demo_flight"
