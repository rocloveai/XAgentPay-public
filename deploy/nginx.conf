# /etc/nginx/sites-available/xagenpay.com
server {
    listen 80;
    server_name xagenpay.com www.xagenpay.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name xagenpay.com www.xagenpay.com;

    # SSL certs (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/xagenpay.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xagenpay.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ── Frontend (static files) ──
    root /var/www/xagenpay;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Nexus Core API ──
    location /api/ {
        proxy_pass http://127.0.0.1:10000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Flight Agent ──
    location /flight/ {
        proxy_pass http://127.0.0.1:10001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Hotel Agent ──
    location /hotel/ {
        proxy_pass http://127.0.0.1:10002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── eSIM Agent ──
    location /esim/ {
        proxy_pass http://127.0.0.1:10005/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Telegram Bot webhook ──
    location /tg-bot/ {
        proxy_pass http://127.0.0.1:10003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Telegram Order Panel ──
    location /panel/ {
        proxy_pass http://127.0.0.1:10004/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
