version: "3.8"

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: xagentpay
      POSTGRES_USER: xagentpay
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xagentpay"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── XAgent Core ──
  xagent-core:
    build:
      context: ../src/xagent-core
      dockerfile: Dockerfile
    restart: always
    ports:
      - "127.0.0.1:10000:10000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TRANSPORT: http
      PORT: "10000"
      DATABASE_URL: postgresql://xagentpay:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/xagentpay?sslmode=disable
      RELAYER_PRIVATE_KEY: ${RELAYER_PRIVATE_KEY}
      ESCROW_CONTRACT: "0x959028964e8a4e52d6AC716E621B68b3fa579A25"
      RPC_URL: "https://rpc.xlayer.tech"
      CHAIN_ID: "196"
      CHAIN_NAME: "XLayer Mainnet"
      USDC_ADDRESS: "0x74b7F16337b8972027F6196A17a631aC6dE26d22"
      BASE_URL: "https://xagenpay.com/api"
      TELEGRAM_NOTIFY_URL: "http://telegram-bot:10000/api/payment-notify"
      # ACP (ERC-8183) — fill after deployment
      ACP_CONTRACT: ${ACP_CONTRACT:-}
      AUTO_EVALUATOR_CONTRACT: ${AUTO_EVALUATOR_CONTRACT:-}

  # ── Flight Agent ──
  flight-agent:
    build:
      context: ../src
      dockerfile: flight-agent/Dockerfile
    restart: always
    ports:
      - "127.0.0.1:10001:10000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TRANSPORT: http
      PORTAL_PORT: "10000"
      PORTAL_HOST: "0.0.0.0"
      DATABASE_URL: postgresql://xagentpay:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/xagentpay?sslmode=disable
      DUFFEL_API_TOKEN: ${DUFFEL_API_TOKEN}
      DEMO_MODE: "true"
      RELAYER_PRIVATE_KEY: ${RELAYER_PRIVATE_KEY}
      MERCHANT_SIGNER_PRIVATE_KEY: ${MERCHANT_SIGNER_PRIVATE_KEY_FLIGHT}
      MERCHANT_PAYMENT_ADDRESS: "0xac9d5239b597f8903da93b9b8d92e6cff564e989"
      MERCHANT_DID: "did:xagent:20250407:demo_flight"
      XAGENT_CORE_URL: "http://xagent-core:10000"
      XAGENT_WEBHOOK_SECRET: "REDACTED_WEBHOOK_SECRET"
      PORTAL_BASE_URL: "https://xagenpay.com/flight"

  # ── Hotel Agent ──
  hotel-agent:
    build:
      context: ../src
      dockerfile: hotel-agent/Dockerfile
    restart: always
    ports:
      - "127.0.0.1:10002:10000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TRANSPORT: http
      PORTAL_PORT: "10000"
      PORTAL_HOST: "0.0.0.0"
      DATABASE_URL: postgresql://xagentpay:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/xagentpay?sslmode=disable
      AMADEUS_API_KEY: ${AMADEUS_API_KEY}
      AMADEUS_API_SECRET: ${AMADEUS_API_SECRET}
      DEMO_MODE: "true"
      RELAYER_PRIVATE_KEY: ${RELAYER_PRIVATE_KEY}
      MERCHANT_SIGNER_PRIVATE_KEY: ${MERCHANT_SIGNER_PRIVATE_KEY_HOTEL}
      MERCHANT_PAYMENT_ADDRESS: "0xac9d5239b597f8903da93b9b8d92e6cff564e989"
      MERCHANT_DID: "did:xagent:20250407:demo_hotel"
      XAGENT_CORE_URL: "http://xagent-core:10000"
      XAGENT_WEBHOOK_SECRET: "REDACTED_WEBHOOK_SECRET"
      PORTAL_BASE_URL: "https://xagenpay.com/hotel"

  # ── eSIM Agent ──
  esim-agent:
    build:
      context: ../src
      dockerfile: esim-agent/Dockerfile
    restart: always
    ports:
      - "127.0.0.1:10005:10000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TRANSPORT: http
      PORTAL_PORT: "10000"
      PORTAL_HOST: "0.0.0.0"
      DATABASE_URL: postgresql://xagentpay:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/xagentpay?sslmode=disable
      DEMO_MODE: "true"
      RELAYER_PRIVATE_KEY: ${RELAYER_PRIVATE_KEY}
      MERCHANT_SIGNER_PRIVATE_KEY: ${MERCHANT_SIGNER_PRIVATE_KEY_ESIM}
      MERCHANT_PAYMENT_ADDRESS: "0xac9d5239b597f8903da93b9b8d92e6cff564e989"
      MERCHANT_DID: "did:xagent:196:demo_esim"
      XAGENT_CORE_URL: "http://xagent-core:10000"
      XAGENT_WEBHOOK_SECRET: "REDACTED_WEBHOOK_SECRET"
      PORTAL_BASE_URL: "https://xagenpay.com/esim"

  # ── Telegram Bot ──
  telegram-bot:
    build:
      context: ../src/telegram-bot
      dockerfile: Dockerfile
    restart: always
    ports:
      - "127.0.0.1:10003:10000"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      XAGENT_CORE_URL: "http://xagent-core:10000"
      PORT: "10000"
      BASE_URL: "https://xagenpay.com/tg-bot"

  # ── Telegram Order Panel ──
  telegram-order-panel:
    image: node:20-slim
    restart: always
    ports:
      - "127.0.0.1:10004:3000"
    working_dir: /app
    volumes:
      - ../src/telegram-order-panel:/app
    command: sh -c "npm install --production && node server.js"
    environment:
      NODE_ENV: production
      PORT: "3000"
      TG_BOT_TOKEN: ${TG_ORDER_BOT_TOKEN}
      FLIGHT_API: "http://flight-agent:10000/api/v1/call-tool"
      HOTEL_API: "http://hotel-agent:10000/api/v1/call-tool"

volumes:
  pgdata:
